services:
  - type: web
    name: apnakit-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PUBLIC_FRONTEND_URL
        value: https://apnakit.in
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        value: rzp_live_T8DiqRBMG1hpNg
      - key: RAZORPAY_KEY_SECRET
        value: gBMGoAQg9OlpAug79dA3AV5A
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        value: ""
      - key: MSG91_SENDER_ID
        value: NISHMRT
      - key: MSG91_ENABLED
        value: "true"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: TRUECALLER_PARTNER_KEY
        sync: false
      - key: TRUECALLER_PARTNER_NAME
        value: ApnaKit
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
    healthCheckPath: /api/v1/health
    autoDeploy: true
